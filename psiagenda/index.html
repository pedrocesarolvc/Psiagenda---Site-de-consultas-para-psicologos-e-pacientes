<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psiagenda - Login</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-logo">Psiagenda</h1>
      <p class="app-tagline">Sua saúde mental em boas mãos</p>
    </header>

    <main class="app-main">
      <div class="auth-card">
        <h2 class="auth-title">Bem-vindo de volta</h2>
        <p class="auth-subtitle">Acesse sua conta</p>

        <form id="form-login" class="auth-form">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>

        <div class="auth-footer">
          <p>Não tem uma conta? <a href="./pages/pacientes/selecionar-perfil.html" class="link">Criar conta</a></p>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>&copy; 2025 Psiagenda. Todos os direitos reservados.</p>
    </footer>
  </div>
  <script src="./js/app-local.js"></script>
</body>
</html>
