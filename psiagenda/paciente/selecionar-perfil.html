<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psiagenda - Escolher Perfil</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-logo">Psiagenda</h1>
    </header>

    <main class="app-main">
      <div class="auth-card">
        <h2 class="auth-title">Como deseja se cadastrar?</h2>
        <p class="auth-subtitle">Escolha o perfil que melhor se adequa a você</p>

        <div class="profile-options">
          <a href="cadastro-paciente.html" class="profile-card">
            <div class="profile-icon">👤</div>
            <h3>Sou Paciente</h3>
            <p>Busco apoio e acompanhamento psicológico</p>
          </a>

          <a href="cadastro-psicologo.html" class="profile-card">
            <div class="profile-icon">👩‍⚕️</div>
            <h3>Sou Psicólogo</h3>
            <p>Ofereço atendimento e acompanhamento profissional</p>
          </a>
        </div>

        <div class="auth-footer">
          <p>Já tem conta? <a href="index.html" class="link">Fazer login</a></p>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>&copy; 2025 Psiagenda. Todos os direitos reservados.</p>
    </footer>
  </div>
  <script src="app-local.js"></script>
</body>
</html>
